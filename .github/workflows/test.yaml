name: Test
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Setup python version
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Checkout
        uses: actions/checkout@v3

      # Start linting
      - name: Install linter dependencies
        run: pip install --disable-pip-version-check black flake8 isort[colors] pylint

      # Install all the requirements files found in this repository
      - name: Install python requirements
        run: find . -name 'requirements.txt' -exec pip install  --disable-pip-version-check -r {} \;

      - name: Check format (black)
        run: black --color --check --diff .

      - name: Import ordering (isort)
        run: isort --color --check-only --diff .

      - name: Lint (flake8)
        run: flake8

      - name: Start mock Jira server
        run: python test/mock_jira_server.py --port 8080 --project-key TEST &

      - name: Create unique name
        run: |
          echo "VERSION=unit-test-$(echo $RANDOM | md5sum | head -c 20)" >> $GITHUB_ENV

      # Start testing against the mock server
      - name: Create version
        uses: ./
        with:
          email: test@test.com
          api_token: fake-token
          host: http://localhost:8080
          project_key: TEST
          version: ${{ env.VERSION }}

      - name: Release version
        uses: ./
        with:
          email: test@test.com
          api_token: fake-token
          host: http://localhost:8080
          project_key: TEST
          version: ${{ env.VERSION }}
          release: true

      - name: Delete version
        uses: ./
        with:
          email: test@test.com
          api_token: fake-token
          host: http://localhost:8080
          project_key: TEST
          version: ${{ env.VERSION }}
          delete: true
